# Key bindings for United States (us) keyboards
# unbind with: bind[] = <keys>
bind[bar_toggle]	= MOD+Shift+b
bind[cycle_layout]	= MOD+backslash
bind[flip_layout]	= MOD+Shift+backslash
bind[float_toggle]	= MOD+f
bind[focus_next]	= MOD+j
bind[focus_prev]	= MOD+k
bind[focus_urgent]	= MOD+u
bind[height_grow]	= MOD+Shift+Up
bind[height_shrink]	= MOD+Shift+Down
bind[lock]	    	= MOD+Delete
bind[master_add]	= MOD+comma
bind[master_del]	= MOD+period
bind[master_grow]	= MOD+l
bind[master_shrink]	= MOD+h
bind[maximize_toggle]	= MOD+m
bind[menu]		    = MOD+space
bind[move_down]		= MOD+Down
bind[move_left]		= MOD+Left
bind[move_right]	= MOD+Right
bind[move_up]		= MOD+Up
bind[mvws_1]		= MOD+Shift+1
bind[mvws_2]		= MOD+Shift+2
bind[mvws_3]		= MOD+Shift+3
bind[mvws_4]		= MOD+Shift+4
bind[mvws_5]		= MOD+Shift+5
bind[mvws_6]		= MOD+Shift+6
bind[mvws_7]		= MOD+Shift+7
bind[mvws_8]		= MOD+Shift+8
bind[mvws_9]		= MOD+Shift+9
bind[mvws_10]		= MOD+Shift+0
bind[quit]		    = MOD+Shift+Escape
bind[restart]	    = MOD+Escape
bind[screenshot_all]	= MOD+Print
bind[screenshot_wind]	= MOD+Shift+Print
bind[search_win]	= MOD+w
bind[stack_dec]		= MOD+Shift+period
bind[stack_inc]		= MOD+Shift+comma
bind[stack_reset]	= MOD+Shift+slash
bind[swap_main]		= MOD+Tab
bind[swap_next]		= MOD+Shift+j
bind[swap_prev]		= MOD+Shift+k
bind[term]		    = MOD+Return
bind[width_grow]	= MOD+Shift+Right
bind[width_shrink]	= MOD+Shift+Left
bind[wind_del]		= MOD+q
bind[wind_kill]		= MOD+Shift+q
bind[ws_1]		= MOD+1
bind[ws_2]		= MOD+2
bind[ws_3]		= MOD+3
bind[ws_4]		= MOD+4
bind[ws_5]		= MOD+5
bind[ws_6]		= MOD+6
bind[ws_7]		= MOD+7
bind[ws_8]		= MOD+8
bind[ws_9]		= MOD+9
bind[ws_10]		= MOD+0
bind[rg_next]   = MOD+grave
bind[rg_move_next]   = MOD+Shift+grave
bind[pass]         = MOD+p
bind[calc]         = XF86Calculator
bind[volup]        = XF86AudioRaiseVolume
bind[voldown]      = XF86AudioLowerVolume
bind[volmute]      = XF86AudioMute
bind[pauseplay]    = MOD+XF86AudioMute
bind[skipfwd]      = MOD+XF86AudioRaiseVolume
bind[skiprev]      = MOD+XF86AudioLowerVolume
bind[navi]         = MOD+F1
bind[quickpulse]   = MOD+v
bind[scratch]      = MOD+Shift+Return
